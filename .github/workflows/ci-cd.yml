name: CI-CD-EKS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    # =========================
    # Checkout
    # =========================
    - name: Checkout code
      uses: actions/checkout@v4

    # =========================
    # AWS Credentials
    # =========================
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # =========================
    # Login ECR
    # =========================
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # =========================
    # Generar IMAGE_TAG
    # =========================
    - name: Set image tag
      run: |
        echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

    # =========================
    # Build Docker Image
    # =========================
    - name: Build Docker image
      run: |
        docker build -t ${{ secrets.ECR_REPOSITORY }}:${IMAGE_TAG} .

    # =========================
    # Tag Docker Image
    # =========================
    - name: Tag Docker image
      run: |
        docker tag \
        ${{ secrets.ECR_REPOSITORY }}:${IMAGE_TAG} \
        ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:${IMAGE_TAG}

    # =========================
    # Push Image ECR
    # =========================
    - name: Push image to Amazon ECR
      run: |
        docker push \
        ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:${IMAGE_TAG}

    # =========================
    # Instalar kubectl
    # =========================
    - name: Install kubectl
      uses: azure/setup-kubectl@v4

    # =========================
    # Configurar kubeconfig
    # =========================
    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
        --region ${{ secrets.AWS_REGION }} \
        --name ${{ secrets.EKS_CLUSTER_NAME }}

    # =========================
    # Validar acceso cluster
    # =========================
    - name: Test cluster access
      run: |
        kubectl get nodes
        kubectl get ns

    # =========================
    # Deploy manifests
    # =========================
    - name: Deploy manifests
      run: |
        kubectl apply -f k8s/

    # =========================
    # Actualizar imagen
    # =========================
    - name: Update deployment image
      run: |
        kubectl set image deployment/inventario-app-deployment \
        inventario-app-container=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:${IMAGE_TAG} \
        -n inventario-dev

    # =========================
    # Verificar rollout
    # =========================
    - name: Verify rollout
      run: |
        kubectl rollout status deployment/inventario-app-deployment \
        -n inventario-dev