name: CI-CD-EKS-AWS

on:
  push:
    branches:
      - develop

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.image-tag.outputs.image_tag}}

    steps:

    # =========================
    # Checkout
    # =========================
    - name: Checkout code
      uses: actions/checkout@v4

    # =========================
    # Generar IMAGE_TAG
    # =========================
    - name: Set image tag
      id: image-tag
      run: |
        IMAGE_TAG=$(git rev-parse --short HEAD)
        echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
        echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

    # =========================
    # Build Docker Image
    # =========================
    - name: Build Docker image
      run: |
        docker build -t ${{ secrets.ECR_REPOSITORY }}:${IMAGE_TAG} .

    # =========================
    # Tag Docker Image
    # =========================
    - name: Tag Docker image
      run: |
        docker tag \
        ${{ secrets.ECR_REPOSITORY }}:${IMAGE_TAG} \
        ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:${IMAGE_TAG}

    # =========================
    # Trivy Image Scan
    # =========================
    - name: Trivy Image Scan
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        image-ref: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
        format: table
        #exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    # =========================
    # Trivy Filesystem Scan
    # =========================
    - name: Trivy Filesystem Scan
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: table
        severity: 'CRITICAL,HIGH'

    # =========================
    # Trivy Kubernetes Config Scan
    # =========================
    - name: Trivy Kubernetes Scan
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        scan-type: 'config'
        scan-ref: './k8s'
        format: table
        #exit-code: '1'
        severity: 'CRITICAL,HIGH'

    # =========================
    # AWS Credentials
    # =========================
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # =========================
    # Login ECR
    # =========================
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2  

    # =========================
    # Push Image ECR
    # =========================
    - name: Push image to Amazon ECR
      run: |
        docker push \
        ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:${IMAGE_TAG}

  deploy-to-eks:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:

    # =========================
    # AWS Credentials
    # =========================
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # =========================
    # Instalar kubectl
    # =========================
    - name: Install kubectl
      uses: azure/setup-kubectl@v4

    # =========================
    # Configurar kubeconfig
    # =========================
    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
        --region ${{ secrets.AWS_REGION }} \
        --name ${{ secrets.EKS_CLUSTER_NAME }}

    # =========================
    # Validar acceso cluster
    # =========================
    - name: Test cluster access
      run: |
        kubectl get nodes
        kubectl get ns

    # =========================
    # Deploy manifests
    # =========================
    #- name: Deploy manifests
    #  run: |
    #    kubectl apply -f k8s/

    # =========================
    # Actualizar imagen
    # =========================
    - name: Update deployment image
      run: |
        kubectl set image deployment/inventario-app-deployment \
        inventario-app-container=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:${{needs.build-and-push.outputs.image_tag}} \
        -n inventario-dev

    # =========================
    # Verificar rollout
    # =========================
    - name: Verify rollout
      run: |
        kubectl rollout status deployment/inventario-app-deployment \
        -n inventario-dev